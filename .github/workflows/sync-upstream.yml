name: Sync Fork with Upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync upstream changes
        run: |
          git fetch upstream
          git merge upstream/master --ff-only
          git push origin master
