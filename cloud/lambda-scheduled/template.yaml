AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "{{PROJECT_NAME}} — scheduled dotflow pipeline on AWS Lambda"

Resources:
  WorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      FunctionName: {{PROJECT_NAME}}
      Timeout: 900
      MemorySize: 512
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: "{{SCHEDULE_EXPRESSION}}"
            Description: "Scheduled trigger for {{PROJECT_NAME}}"
            Enabled: true
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt WorkflowFunction.Arn
  ScheduleRule:
    Description: EventBridge schedule rule
    Value: "{{SCHEDULE_EXPRESSION}}"
