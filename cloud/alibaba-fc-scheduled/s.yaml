edition: 3.0.0
name: {{PROJECT_NAME}}
access: default

vars:
  region: "{{ALIBABA_REGION}}"

resources:
  workflow:
    component: fc3
    props:
      region: ${vars.region}
      functionName: {{PROJECT_NAME}}
      description: "{{PROJECT_NAME}} — scheduled dotflow pipeline on Alibaba Function Compute"
      runtime: custom-container
      cpu: 1
      memorySize: 512
      diskSize: 512
      timeout: 900
      caPort: 9000
      customContainerConfig:
        image: "registry.${vars.region}.aliyuncs.com/{{ALIBABA_NAMESPACE}}/{{PROJECT_NAME}}:latest"
        port: 9000
      handler: handler.handler
      triggers:
        - triggerName: scheduled-trigger
          triggerType: timer
          triggerConfig:
            cronExpression: "{{SCHEDULE_EXPRESSION}}"
            payload: "{}"
            enable: true
